        1: { oneLine: "Find sum of all digits of N", logic: "Convert to string, iterate digits and sum, or use %10 and //10 loop", traps: "Handle negative numbers (use abs). Don't forget N=0 gives sum 0.", why: "Simple digit extraction—string conversion is cleanest in Python", complexity: "O(d) / O(1) where d = digits" },

        5: { oneLine: "Check if N is prime", logic: "Check divisibility from 2 to √N. If any divides, not prime.", traps: "N < 2 is not prime. Must check up to √N inclusive. 1 is NOT prime.", why: "√N optimization: if no factor ≤ √N, N is prime", complexity: "O(√n) / O(1)" },

        8: { oneLine: "Print first N Fibonacci numbers", logic: "Start with a=0,b=1; in loop: print a, then a,b = b,a+b", traps: "N=1 should print just '0'. Off-by-one in loop count.", why: "Iterative approach avoids exponential recursion overhead", complexity: "O(n) / O(1)" },
        9: { oneLine: "Check if N equals sum of its proper divisors", logic: "Sum all divisors from 1 to N-1 where N%i==0", traps: "1 is NOT a perfect number (sum of proper divisors of 1 is 0). Check i < N.", why: "Can optimize by checking up to √N and adding both i and N/i", complexity: "O(√n) / O(1)" },
        10: { oneLine: "Check if sum of digits^k equals N (k = digit count)", logic: "Count digits (k), sum each digit raised to power k, compare with N", traps: "Power k varies with number of digits. 1 is Armstrong (1^1=1).", why: "Direct computation—no shortcut for narcissistic numbers", complexity: "O(d) / O(1)" },
        11: { oneLine: "Find LCM of two numbers", logic: "LCM(a,b) = (a×b) / GCD(a,b). Find GCD first using Euclidean algo.", traps: "Use a*b//gcd to avoid float division. Integer overflow in C for large numbers.", why: "Mathematical relationship between LCM and GCD makes it efficient", complexity: "O(log(min(a,b))) / O(1)" },
        12: { oneLine: "Check if string reads same forwards & backwards", logic: "Compare s == s[::-1]", traps: "Case-sensitive comparison. Empty string is a palindrome.", why: "String slicing is the cleanest palindrome check", complexity: "O(n) / O(n)" },
        13: { oneLine: "Remove duplicate characters, keep first occurrence", logic: "Use a set to track seen chars. Append to result only if not seen.", traps: "Must maintain original order. set() alone loses order.", why: "Set provides O(1) lookup for seen tracking", complexity: "O(n) / O(n)" },
        14: { oneLine: "Check if two strings are anagrams", logic: "Sort both strings (lowercased) and compare, or compare character frequency counts", traps: "Case-insensitive—convert both to lowercase. Different lengths → not anagram.", why: "Sorting approach is simple; Counter approach is O(n)", complexity: "O(n log n) / O(n)" },
        15: { oneLine: "Sum all primes from 2 to N", logic: "For each number 2..N, check if prime, then add to sum. Or use Sieve of Eratosthenes.", traps: "Sieve is faster for large N. Don't include 1 as prime.", why: "Sieve of Eratosthenes precomputes all primes in O(N log log N)", complexity: "O(N√N) or O(N log log N) / O(N)" },
        16: { oneLine: "Convert decimal N to binary string", logic: "Repeatedly divide by 2, prepend remainder. Or use bin() but strip '0b'.", traps: "N=0 should give '0'. Build string from right to left.", why: "Manual division shows understanding; built-ins are faster", complexity: "O(log n) / O(log n)" },
        17: { oneLine: "Reverse word order in a sentence", logic: "Split by spaces, reverse the list, join with space", traps: "Multiple spaces should be treated as one. Leading/trailing spaces.", why: "split() handles multiple spaces automatically", complexity: "O(n) / O(n)" },
        18: { oneLine: "Find the character with highest frequency", logic: "Build frequency dict, find max value, return first char with that frequency", traps: "If tie, return first occurrence in original string—not alphabetically first.", why: "Two-pass: build freq, then scan original string for first max", complexity: "O(n) / O(1) (26 chars max)" },
        19: { oneLine: "Find first character that appears exactly once", logic: "Build frequency dict, then scan string for first char with count 1", traps: "Return -1 if all characters repeat. Order matters—scan original string.", why: "Two-pass approach ensures correct first occurrence", complexity: "O(n) / O(1)" },
        20: { oneLine: "Check if string contains all 26 English letters", logic: "Convert to lowercase, extract set of alpha chars, check len == 26", traps: "Ignore non-alphabetic characters. Case-insensitive.", why: "Set of unique chars is simplest check", complexity: "O(n) / O(1)" },
        21: { oneLine: "Check if sum of factorial of digits equals N", logic: "For each digit, compute factorial and sum them. Compare with N.", traps: "Precompute factorials 0!-9! to avoid repeated calculation.", why: "Only single-digit factorials needed (0-9)", complexity: "O(d) / O(1)" },
        22: { oneLine: "Compress consecutive repeating chars: a3b2c1", logic: "Iterate with counter, when char changes output char+count", traps: "If count is 1, output just the char (no count). Handle last group.", why: "Single pass with tracking current char and count", complexity: "O(n) / O(n)" },
        23: { oneLine: "Find second largest distinct element in array", logic: "Get unique elements via set, sort descending, return index [1]", traps: "All same elements → return -1. Need DISTINCT second largest, not second element.", why: "Set removes duplicates; sort gives ordered access", complexity: "O(n log n) / O(n)" },
        24: { oneLine: "Rotate array right by K positions", logic: "K = K % N. Result = arr[-K:] + arr[:-K]", traps: "K can be > N, must use K % N. K=0 means no rotation.", why: "Slicing is O(N); reversal trick also works in-place", complexity: "O(n) / O(n)" },
        25: { oneLine: "Find missing number in 1 to N", logic: "Expected sum N*(N+1)/2 minus actual sum = missing number", traps: "Use formula to avoid sorting. XOR approach also works.", why: "Math formula gives O(1) space, O(N) time", complexity: "O(n) / O(1)" },
        26: { oneLine: "Find all prime factors (with repetition)", logic: "Divide by d starting from 2. While d*d ≤ N, extract all factors of d.", traps: "After loop, if N > 1, N itself is a prime factor. Include repeated factors.", why: "Trial division up to √N covers all prime factors", complexity: "O(√n) / O(log n)" },
        27: { oneLine: "Sort array without built-in sort", logic: "Implement Bubble Sort: nested loops, swap if arr[j] > arr[j+1]", traps: "Off-by-one in inner loop (n-i-1). Can use Selection or Insertion sort too.", why: "Bubble sort is simplest to implement from scratch", complexity: "O(n²) / O(1)" },
        28: { oneLine: "Transpose a matrix (swap rows ↔ columns)", logic: "New matrix: for each col j, row is [matrix[i][j] for i in rows]", traps: "M×N matrix becomes N×M. Don't confuse indices.", why: "Simple nested loop or zip(*matrix) in Python", complexity: "O(M×N) / O(M×N)" },
        29: { oneLine: "Check if any pair in array sums to K", logic: "Use a set. For each element x, check if (K-x) is in set, then add x.", traps: "Handle duplicates. Check complement BEFORE adding current element.", why: "Hash set provides O(1) lookup, making it O(N) overall", complexity: "O(n) / O(n)" },
        30: { oneLine: "Convert binary string to decimal number", logic: "Iterate bits left to right: result = result * 2 + int(bit)", traps: "Leading zeros are valid in binary. Don't use int(s,2) if not allowed.", why: "Horner's method processes bits left to right efficiently", complexity: "O(n) / O(1)" },
        31: { oneLine: "Print frequency of each character (sorted)", logic: "Build freq dict, iterate sorted keys, print char and count", traps: "Output must be in alphabetical order. Only count chars that appear.", why: "Dictionary + sorted iteration ensures alphabetical output", complexity: "O(n + k log k) / O(k) k=unique chars" },
        32: { oneLine: "Find the longest word in a sentence", logic: "Split into words, find max by length", traps: "If multiple words tie, return the first one. Handle multiple spaces.", why: "max() with key=len is Pythonic and clean", complexity: "O(n) / O(n)" },

        34: { oneLine: "Check if N is a power of 2", logic: "N > 0 and (N & (N-1)) == 0. Bit trick: power of 2 has exactly one set bit.", traps: "N must be > 0. Zero is not a power of 2.", why: "Bitwise AND trick is O(1) and elegant", complexity: "O(1) / O(1)" },

    // Build combined question list
    function buildAllQuestions() {
        const all = [];
        questions.forEach(q => {
            const rd = revisionData[q.id] || {};
            all.push({
                id: q.id, displayId: q.id, title: q.title, difficulty: q.difficulty,
                category: q.category, tags: q.tags, source: 'main',
                description: q.description,
                oneLine: rd.oneLine || '', logic: rd.logic || '', traps: rd.traps || '',
                why: rd.why || '', complexity: rd.complexity || ''
            });
        });
        geminiQuestions.forEach(q => {
            const rd = revisionData[q.id] || {};
            all.push({
                id: q.id, displayId: q.id.replace('g', 'G'), title: q.title, difficulty: q.difficulty,
                category: q.category, tags: q.tags, source: 'gemini',
                description: q.description,
                oneLine: rd.oneLine || '', logic: rd.logic || '', traps: rd.traps || '',
                why: rd.why || '', complexity: rd.complexity || ''
            });
        });
        return all;
    }

    const allQuestions = buildAllQuestions();

    // Populate category filter
    const cats = [...new Set(allQuestions.map(q => q.category))].sort();
    const catFilter = document.getElementById('cat-filter');
    cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catFilter.appendChild(o); });

    function renderTable(list) {
        const tbody = document.getElementById('revision-tbody');
        tbody.innerHTML = list.map(q => {
            const diffClass = q.difficulty === 'Easy' ? 'diff-easy' : q.difficulty === 'Medium' ? 'diff-medium' : 'diff-hard';
            return `<tr>
                <td class="col-id">${q.displayId}</td>
                <td><span class="${diffClass}" style="font-weight:600;font-size:0.72rem">${q.difficulty}</span></td>
                <td><span class="cat-badge">${q.category}</span></td>
                <td class="col-title">${q.title}</td>
                <td class="col-oneline">${q.oneLine}</td>
                <td class="col-logic">${q.logic}</td>
                <td class="col-traps">${q.traps}</td>
                <td class="col-why">${q.why}</td>
                <td class="col-complexity">${q.complexity}</td>
            </tr>`;
        }).join('');

        document.getElementById('showing-count').textContent = list.length;
        document.getElementById('easy-count').textContent = list.filter(q => q.difficulty === 'Easy').length;
        document.getElementById('medium-count').textContent = list.filter(q => q.difficulty === 'Medium').length;
        document.getElementById('hard-count').textContent = list.filter(q => q.difficulty === 'Hard').length;
    }

    function applyFilters() {
        const search = document.getElementById('search').value.toLowerCase();
        const diff = document.getElementById('diff-filter').value;
        const cat = document.getElementById('cat-filter').value;
        const src = document.getElementById('source-filter').value;

        let filtered = allQuestions.filter(q => {
            if (diff !== 'all' && q.difficulty !== diff) return false;
            if (cat !== 'all' && q.category !== cat) return false;
            if (src !== 'all' && q.source !== src) return false;
            if (search) {
                const hay = `${q.title} ${q.oneLine} ${q.logic} ${q.traps} ${q.why} ${q.tags.join(' ')} ${q.category}`.toLowerCase();
                if (!hay.includes(search)) return false;
            }
            return true;
        });
        renderTable(filtered);
    }

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('diff-filter').addEventListener('change', applyFilters);
    document.getElementById('cat-filter').addEventListener('change', applyFilters);
    document.getElementById('source-filter').addEventListener('change', applyFilters);

    // Back to top button
    const btn = document.getElementById('back-top');
    window.addEventListener('scroll', () => { btn.classList.toggle('show', window.scrollY > 400); });
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // Initial render
    renderTable(allQuestions);
    </script>
